apiVersion: v1
kind: Secret
metadata:
  name: cost-optimizer-secret
  namespace: cost-optimizer
  annotations:
    # Use AWS Secrets Manager or Sealed Secrets in production
    # kubectl create secret generic cost-optimizer-secret \
    #   --from-literal=DB_HOST=<rds-endpoint> \
    #   --from-literal=DB_USER=<username> \
    #   --from-literal=DB_PASSWORD=<password> \
    #   --from-literal=JWT_SECRET_KEY=<secret> \
    #   -n cost-optimizer
type: Opaque
# Do NOT hardcode values here. Populate via:
# - AWS Secrets Manager + External Secrets Operator
# - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
# - kubectl create secret (values injected at deploy time via CI/CD)
